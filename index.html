<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel PMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b1120;
color:white;
height:100vh;
overflow:hidden;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
height:80px;
background:rgba(15,23,42,.95);
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
backdrop-filter:blur(10px);
}

.logo{
font-size:26px;
font-weight:700;
}

.stats{
display:flex;
gap:16px;
}

.stat{
background:rgba(255,255,255,.05);
padding:10px 16px;
border-radius:16px;
min-width:120px;
animation:fade .4s;
}

.stat-title{
font-size:12px;
opacity:.7;
}

.stat-value{
font-size:24px;
font-weight:700;
margin-top:4px;
}

.main{
display:grid;
grid-template-columns:1fr 1fr 1fr 340px;
gap:20px;
padding:20px;
overflow:auto;
height:calc(100vh - 80px);
}

.column{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:18px;
overflow:auto;
}

.column-title{
font-size:22px;
font-weight:700;
margin-bottom:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.room-card{
padding:18px;
border-radius:22px;
margin-bottom:16px;
cursor:pointer;
transition:.25s;
position:relative;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
animation:fade .35s;
}

.room-card:hover{
transform:translateY(-4px) scale(1.02);
}

.room-card::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to bottom right,rgba(255,255,255,.08),transparent);
pointer-events:none;
}

.available{
background:linear-gradient(145deg,#14532d,#166534);
}

.booked{
background:linear-gradient(145deg,#7c2d12,#dc2626);
}

.important{
background:linear-gradient(145deg,#1d4ed8,#2563eb);
}

.room-number{
font-size:22px;
font-weight:700;
}

.room-user{
margin-top:10px;
font-size:14px;
opacity:.9;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
background:rgba(255,255,255,.12);
margin-top:12px;
font-size:12px;
}

.sidepanel{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:18px;
overflow:auto;
}

button{
border:none;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:12px;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:.25s;
width:100%;
margin-top:10px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(37,99,235,.3);
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#111827;
color:white;
margin-top:10px;
}

.notification{
padding:12px;
background:rgba(255,255,255,.05);
border-radius:14px;
margin-top:10px;
font-size:14px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
backdrop-filter:blur(6px);
z-index:100;
}

.modal-content{
background:#111827;
padding:26px;
border-radius:24px;
width:400px;
animation:pop .25s;
}

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="app">

<div class="topbar">
<div class="logo">Hotel PMS</div>

<div class="stats">
<div class="stat">
<div class="stat-title">DAY</div>
<div class="stat-value" id="dayDisplay"></div>
</div>

<div class="stat">
<div class="stat-title">REVENUE</div>
<div class="stat-value" id="revenueStat">$0</div>
</div>

<div class="stat">
<div class="stat-title">OCCUPIED</div>
<div class="stat-value" id="occupiedStat">0</div>
</div>

<div class="stat">
<div class="stat-title">IMPORTANT</div>
<div class="stat-value" id="importantStat">0</div>
</div>
</div>
</div>

<div class="main">

<div class="column">
<div class="column-title">
AVAILABLE
</div>

<div id="availableRooms"></div>
</div>

<div class="column">
<div class="column-title">
BOOKED
</div>

<div id="bookedRooms"></div>
</div>

<div class="column">
<div class="column-title">
IMPORTANT
</div>

<div id="importantRooms"></div>
</div>

<div class="sidepanel">

<h2>Controls</h2>

<button onclick="nextDay()">Next Day</button>
<button onclick="quickCheckin()">Quick Check-In</button>
<button onclick="clearAll()">Clear All</button>

<h2 style="margin-top:30px">Cleaner Dashboard</h2>
<div id="cleanerQueue"></div>

<h2 style="margin-top:30px">Notifications</h2>
<div id="notifications"></div>

<h2 style="margin-top:30px">Guest Search</h2>

<input id="searchInput" placeholder="Search username..." onkeyup="searchGuest()">

<div id="searchResults"></div>

</div>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let currentDay=parseInt(localStorage.getItem('day'))||1;

let guestHistory=JSON.parse(localStorage.getItem('guestHistory'))||[];

let rooms=JSON.parse(localStorage.getItem('rooms'))||{
1:{type:'Deluxe',price:100,status:'available'},
2:{type:'Deluxe',price:100,status:'available'},
3:{type:'Executive',price:200,status:'available'},
4:{type:'Deluxe',price:100,status:'available'},
5:{type:'Standard',price:50,status:'available'},
6:{type:'Standard',price:50,status:'available'},
7:{type:'Standard',price:50,status:'available'},
8:{type:'Standard',price:50,status:'available'}
};

function save(){
localStorage.setItem('rooms',JSON.stringify(rooms));
localStorage.setItem('day',currentDay);
localStorage.setItem('guestHistory',JSON.stringify(guestHistory));
}

function getRoomSection(r){

if(r.status==='available'){
return 'available';
}

if(r.needsCleaning || currentDay>=r.checkoutDay){
return 'important';
}

return 'booked';

}

function render(){

let available='';
let booked='';
let important='';

let revenue=0;
let occupied=0;
let importantCount=0;
let cleaner='';
let notes='';

for(let i in rooms){

let r=rooms[i];

let section=getRoomSection(r);

let remaining=((r.total||0)+(r.charges||0))-(r.paid||0);

revenue+=(r.paid||0);

if(section!=='available'){
occupied++;
}

if(section==='important'){
importantCount++;
}

let statusText='';

if(r.needsCleaning){
statusText='🧹 NEEDS CLEANING';
}
else if(currentDay===r.checkoutDay){
statusText='⚠ CHECKOUT TODAY';
}
else if(currentDay>r.checkoutDay){
statusText='🚨 OVERDUE';
}
else{
statusText='BOOKED';
}

let card=`
<div class="room-card ${section}" onclick="openRoom(${i})">
<div class="room-number">Room ${i}</div>
<div>${r.type}</div>
<div class="room-user">${r.user||'Ready to book'}</div>
<div class="badge">${statusText}</div>

${r.checkoutDay?`
<div style="margin-top:10px;font-size:13px">
Checkout: Day ${r.checkoutDay}
</div>
`:''}

${remaining>0?`
<div style="margin-top:8px">
$${remaining} Remaining
</div>
`:''}
</div>
`;

if(section==='available'){
available+=card;
}
else if(section==='booked'){
booked+=card;
}
else{
important+=card;
}

if(r.needsCleaning){
cleaner+=`
<div class="notification">
🧹 Room ${i}
<button onclick="markClean(${i})">
Mark Cleaned
</button>
</div>
`;
}

if(currentDay===r.checkoutDay){
notes+=`
<div class="notification">
⚠ Room ${i} checkout due today
</div>
`;
}

}

document.getElementById('availableRooms').innerHTML=available;
document.getElementById('bookedRooms').innerHTML=booked;
document.getElementById('importantRooms').innerHTML=important;

document.getElementById('dayDisplay').innerText=currentDay;
document.getElementById('revenueStat').innerText='$'+revenue;
document.getElementById('occupiedStat').innerText=occupied;
document.getElementById('importantStat').innerText=importantCount;

document.getElementById('cleanerQueue').innerHTML=
cleaner||'<div class="notification">No rooms pending</div>';

document.getElementById('notifications').innerHTML=
notes||'<div class="notification">No alerts</div>';

save();

}

function openRoom(id){

let r=rooms[id];

let total=(r.total||0)+(r.charges||0);

let remaining=total-(r.paid||0);

showModal(`
<h2>Room ${id}</h2>

<p style="margin-top:8px">${r.type}</p>
<p>${r.user||''}</p>

<div style="margin-top:20px">

<button onclick="checkin(${id})">
Check In
</button>

<button onclick="extendStay(${id})">
Extend Booking
</button>

<button onclick="paySome(${id})">
Pay Some
</button>

<button onclick="checkout(${id})">
Check Out
</button>

</div>

<div style="margin-top:20px">

<p>Total: $${total}</p>
<p>Paid: $${r.paid||0}</p>
<p>Remaining: $${remaining}</p>

</div>

<button onclick="closeModal()" style="margin-top:20px">
Close
</button>
`);

}

function checkin(id){

showModal(`
<h2>Check In</h2>

<input id="username" placeholder="Username">

<input id="nights" type="number" placeholder="Nights">

<input id="guests" type="number" placeholder="Guests">

<button onclick="confirmCheckin(${id})">
Continue
</button>
`);

}

function confirmCheckin(id){

let u=document.getElementById('username').value;

let n=parseInt(document.getElementById('nights').value);

let g=parseInt(document.getElementById('guests').value)||1;

let extraGuests=Math.max(0,g-1);

let guestFees=extraGuests*10*n;

let total=(rooms[id].price*n)+guestFees;

showModal(`
<h2>Full Payment Required</h2>

<p>Total: $${total}</p>

<p>Room: $${rooms[id].price*n}</p>

<p>Guest Fees: $${guestFees}</p>

<button onclick="finishCheckin(${id},'${u}',${n},${g},${total})">
Pay & Check In
</button>
`);

}

function finishCheckin(id,u,n,g,total){

rooms[id]={
...rooms[id],
user:u,
checkoutDay:currentDay+n,
status:'booked',
needsCleaning:false,
guests:g,
total:total,
paid:total,
charges:0,
vip:false
};

closeModal();
render();

}

function quickCheckin(){

showModal(`
<h2>Quick Check-In</h2>

<input id="quickUser" placeholder="Username">

<input id="quickGuests" type="number" placeholder="Guests">

<input id="quickNights" type="number" placeholder="Nights">

<select id="quickType">
<option>Standard</option>
<option>Deluxe</option>
<option>Executive</option>
</select>

<button onclick="doQuickCheckin()">
Assign Room
</button>
`);

}

function doQuickCheckin(){

let u=document.getElementById('quickUser').value;

let g=parseInt(document.getElementById('quickGuests').value)||1;

let n=parseInt(document.getElementById('quickNights').value);

let t=document.getElementById('quickType').value;

for(let i in rooms){

if(rooms[i].type===t && rooms[i].status==='available'){

let extraGuests=Math.max(0,g-1);

let guestFees=extraGuests*10*n;

let total=(rooms[i].price*n)+guestFees;

rooms[i]={
...rooms[i],
user:u,
checkoutDay:currentDay+n,
status:'booked',
needsCleaning:false,
guests:g,
total:total,
paid:total,
charges:0,
vip:false
};

closeModal();
render();
return;

}

}

showModal(`
<h2>No Rooms Available</h2>

<button onclick="closeModal()">
Close
</button>
`);

}

function nextDay(){

currentDay++;

for(let i in rooms){

if(rooms[i].status!=='available'){

rooms[i].needsCleaning=true;

}

}

render();

}

function markClean(id){

rooms[id].needsCleaning=false;

render();

}

function extendStay(id){

showModal(`
<h2>Extend Stay</h2>

<input id="extraNights" type="number" placeholder="Extra nights">

<button onclick="confirmExtend(${id})">
Extend
</button>
`);

}

function confirmExtend(id){

let extra=parseInt(document.getElementById('extraNights').value);

rooms[id].checkoutDay+=extra;

let extraGuests=Math.max(0,(rooms[id].guests||1)-1);

rooms[id].total+=(rooms[id].price*extra)+(extraGuests*10*extra);

rooms[id].paid=rooms[id].total;

closeModal();
render();

}

function paySome(id){

showModal(`
<h2>Add Payment</h2>

<input id="paymentAmount" type="number" placeholder="Amount">

<button onclick="confirmPayment(${id})">
Pay
</button>
`);

}

function confirmPayment(id){

let p=parseFloat(document.getElementById('paymentAmount').value)||0;

rooms[id].paid+=p;

closeModal();
render();

}

function checkout(id){

guestHistory.push({
user:rooms[id].user,
room:id,
total:rooms[id].total,
day:currentDay,
vip:rooms[id].vip
});

rooms[id]={
type:rooms[id].type,
price:rooms[id].price,
status:'available'
};

closeModal();
render();

}

function searchGuest(){

let q=document.getElementById('searchInput').value.toLowerCase();

let out='';

for(let g of guestHistory){

if(g.user.toLowerCase().includes(q)){

out+=`
<div class="notification">
${g.vip?'⭐ ':''}${g.user}
<br>
Room ${g.room}
<br>
Spent $${g.total}
</div>
`;

}

}

document.getElementById('searchResults').innerHTML=
out||'<div class="notification">No results</div>';

}

function clearAll(){

if(confirm('Clear all data?')){

localStorage.clear();
location.reload();

}

}

function showModal(html){

document.getElementById('modal').style.display='flex';
document.getElementById('modalContent').innerHTML=html;

}

function closeModal(){

document.getElementById('modal').style.display='none';

}

render();

</script>

</body>
</html>
