<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel System</title>
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#0f172a; color:#fff; }
header { display:flex; justify-content:space-between; padding:15px; background:#111827; align-items:center; }
button { background:#2563eb; border:none; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; margin:2px; }
button:hover { background:#1d4ed8; }
.grid { display:grid; grid-template-columns: repeat(5,1fr); gap:12px; padding:15px; }
.room { padding:15px; border-radius:12px; cursor:pointer; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
.available { background:#16a34a; }
.occupied { background:#dc2626; } /* RED */
.due { background:#f59e0b; } /* ORANGE */
.maintenance { background:#6b7280; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; }
.modal-content { background:#1e293b; padding:20px; border-radius:12px; width:320px; }
input, select { width:100%; padding:6px; margin:5px 0; border-radius:6px; border:none; }
.bar { height:10px; background:#374151; border-radius:10px; overflow:hidden; }
.bar-fill { height:100%; background:#22c55e; }
</style>
</head>
<body>
<header>
<div>
<button onclick="prevDay()">◀</button>
<span id="day"></span>
<button onclick="nextDay()">▶</button>
</div>
<div>
<button onclick="quickCheckin()">⚡ Quick Check-In</button>
<button onclick="clearAll()">🗑 Clear All</button>
</div>
<div id="occupancy"></div>
</header>

<h2 style="padding-left:10px;">Floor 1</h2>
<div class="grid" id="floor1"></div>
<h2 style="padding-left:10px;">Floor 2</h2>
<div class="grid" id="floor2"></div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
let currentDay=parseInt(localStorage.getItem('day'))||1;
let rooms=JSON.parse(localStorage.getItem('rooms'))||{
1:{type:"Deluxe",price:100,status:"available"},2:{type:"Deluxe",price:100,status:"available"},3:{type:"Executive",price:200,status:"available"},4:{type:"Deluxe",price:100,status:"available"},5:{type:"Standard",price:50,status:"available"},6:{type:"Standard",price:50,status:"available"},7:{type:"Standard",price:50,status:"available"},8:{type:"Standard",price:50,status:"available"},9:{type:"Executive",price:200,status:"available"},10:{type:"Deluxe",price:100,status:"available"},11:{type:"Deluxe",price:100,status:"available"}
};

function save(){localStorage.setItem('rooms',JSON.stringify(rooms));localStorage.setItem('day',currentDay);}

function getStatus(r){
if(r.status==='maintenance') return 'maintenance';
if(r.status==='available') return 'available';
if(currentDay < r.checkoutDay) return 'occupied';
if(currentDay === r.checkoutDay) return 'due';
return 'available';
}

function render(){
let f1="",f2="",occ=0;
for(let i in rooms){
let r=rooms[i];
let status=getStatus(r);
if(status==='occupied') occ++;
let name=r.user?`<br>${r.user}`:"";
let div=`<div class='room ${status}' onclick='openRoom(${i})'>Room ${i}<br>${r.type}${name}</div>`;
if(i<=8)f1+=div;else f2+=div;
}
document.getElementById('floor1').innerHTML=f1;
document.getElementById('floor2').innerHTML=f2;
document.getElementById('day').innerText="Day "+currentDay;
document.getElementById('occupancy').innerHTML=`${occ}/11<div class='bar'><div class='bar-fill' style='width:${(occ/11)*100}%'></div></div>`;
save();
}

function openRoom(id){
let r=rooms[id];
let status=getStatus(r);
let total=(r.total||0)+(r.charges||0);
let paid=r.paid||0;
let remaining=total-paid;

let html=`<h3>Room ${id}</h3><p>${r.type}</p><p>${r.user||""}</p><p>Status:${status}</p>`;

if(status==='available') html+=`<button onclick='checkin(${id})'>Check In</button>`;

if(status==='occupied'||status==='due') html+=`
<button onclick='checkout(${id})'>Check Out</button>
<button onclick='addCharge(${id})'>Add Charge</button>
<button onclick='paySome(${id})'>Pay Some</button>
<button onclick='addGuest(${id})'>Add Guest (+$10)</button>
<p>Total:$${total}</p>
<p>Paid:$${paid}</p>
<p>Remaining:$${remaining}</p>`;

html+=`<br><button onclick='setMaintenance(${id})'>Maintenance</button>
<button onclick='closeModal()'>Close</button>`;

showModal(html);
}

function checkin(id){
showModal(`Username:<input id='user'><br>Nights:<input id='nights' type='number'><br><button onclick='confirmCheckin(${id})'>Next</button>`);
}

function confirmCheckin(id){
let u=document.getElementById('user').value;
let n=parseInt(document.getElementById('nights').value);
if(!u||!n)return;
let total=rooms[id].price*n;
showModal(`Total:$${total}<br><button onclick='finishCheckin(${id},"${u}",${n},${total})'>Confirm</button>`);
}

function finishCheckin(id,u,n,total){
rooms[id]={...rooms[id],status:'occupied',user:u,checkoutDay:currentDay+n,total:total,charges:0,paid:0,guests:[]};
closeModal();render();
}

function checkout(id){
let r=rooms[id];
let remaining=(r.total||0)+(r.charges||0)-(r.paid||0);
if(remaining>0){showModal(`Remaining:$${remaining} must be paid`);return;}
rooms[id]={type:rooms[id].type,price:rooms[id].price,status:'available'};
closeModal();render();
}

function addCharge(id){
showModal(`Item<input id='i'><br>Amount<input id='a' type='number'><button onclick='cCharge(${id})'>Add</button>`);
}
function cCharge(id){
let a=parseFloat(document.getElementById('a').value);
rooms[id].charges=(rooms[id].charges||0)+a;
closeModal();render();
}

function paySome(id){
showModal(`Amount<input id='p' type='number'><button onclick='cPay(${id})'>Pay</button>`);
}
function cPay(id){
let p=parseFloat(document.getElementById('p').value);
rooms[id].paid=(rooms[id].paid||0)+p;
closeModal();render();
}

function addGuest(id){
showModal(`Guest username<input id='g'><button onclick='cGuest(${id})'>Add</button>`);
}
function cGuest(id){
let g=document.getElementById('g').value;
rooms[id].guests.push(g);
rooms[id].charges+=10;
closeModal();render();
}

function quickCheckin(){
showModal(`User<input id='u'><br>Guests<input id='g' type='number'><br>Nights<input id='n' type='number'><br>Type<select id='t'><option>Standard</option><option>Deluxe</option><option>Executive</option></select><br><button onclick='doQuick()'>Go</button>`);
}

function doQuick(){
let u=document.getElementById('u').value;
let g=parseInt(document.getElementById('g').value)||0;
let n=parseInt(document.getElementById('n').value);
let t=document.getElementById('t').value;
for(let i in rooms){
if(rooms[i].type===t && getStatus(rooms[i])==='available'){
rooms[i]={...rooms[i],status:'occupied',user:u,checkoutDay:currentDay+n,total:rooms[i].price*n,charges:0,paid:0,guests:[]};
for(let x=0;x<g;x++) rooms[i].guests.push('guest'+x);
break;
}
}
closeModal();render();
}

function setMaintenance(id){rooms[id].status='maintenance';closeModal();render();}

function clearAll(){ if(confirm('Clear all data?')){ localStorage.clear(); location.reload(); } }

function nextDay(){currentDay++;render();}
function prevDay(){if(currentDay>1)currentDay--;render();}

function showModal(h){document.getElementById('modal').style.display='flex';document.getElementById('modalContent').innerHTML=h;}
function closeModal(){document.getElementById('modal').style.display='none';}

render();
</script>
</body>
</html>
